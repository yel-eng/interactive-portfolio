<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lensora — عالم العدسات الملونة</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/index.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.1.0/index.min.css">
<style>
:root{
  --bg:#060404;
  --card-bg:rgba(18,14,12,.65);
  --gold:#c9a84c;
  --gold-light:#e8d5a3;
  --gold-dim:rgba(201,168,76,.15);
  --text:#f5ede0;
  --text-dim:#6b6058;
  --radius:24px;
  --radius-sm:14px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
button{cursor:pointer;border:none;font-family:inherit}

/* AMBIENT BG */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient-orb{position:absolute;border-radius:50%;filter:blur(140px);opacity:.07}
.ambient-orb:nth-child(1){width:600px;height:600px;background:#c9a84c;top:-15%;right:-10%;animation:orb1 22s ease-in-out infinite}
.ambient-orb:nth-child(2){width:500px;height:500px;background:#4A90D9;bottom:-10%;left:-8%;animation:orb2 28s ease-in-out infinite}
.ambient-orb:nth-child(3){width:350px;height:350px;background:#7B5EA7;top:45%;left:40%;animation:orb3 18s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}33%{transform:translate(-100px,80px)}66%{transform:translate(60px,-50px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}33%{transform:translate(80px,-70px)}66%{transform:translate(-60px,40px)}}
@keyframes orb3{0%,100%{transform:translate(-50%,-50%)}33%{transform:translate(calc(-50% + 80px),calc(-50% - 50px))}66%{transform:translate(calc(-50% - 50px),calc(-50% + 80px))}}

#particlesCanvas{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.35}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:18px 5%;display:flex;align-items:center;justify-content:space-between;background:rgba(6,4,4,.2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,.04);transition:all .4s}
.nav.scrolled{background:rgba(6,4,4,.85);padding:12px 5%;border-bottom-color:rgba(201,168,76,.08)}
.nav-logo{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);letter-spacing:4px;display:flex;align-items:center;gap:12px}
.nav-logo svg{width:32px;height:32px;animation:logoSpin 20s linear infinite}
@keyframes logoSpin{to{transform:rotate(360deg)}}
.nav-logo span{font-size:10px;letter-spacing:3px;color:var(--text-dim);font-family:'Inter',sans-serif;display:block;font-weight:400}
.nav-actions{display:flex;gap:12px;align-items:center}
.cart-btn{background:rgba(201,168,76,.06);color:var(--gold);padding:12px 22px;border-radius:50px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;border:1px solid rgba(201,168,76,.08);transition:all .3s;position:relative;backdrop-filter:blur(10px)}
.cart-btn:hover{background:var(--gold);color:var(--bg);box-shadow:0 0 30px rgba(201,168,76,.2)}
.cart-badge{background:var(--danger);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;position:absolute;top:-6px;left:-6px;animation:popBadge .4s cubic-bezier(.68,-.55,.27,1.55)}
@keyframes popBadge{from{transform:scale(0)}to{transform:scale(1)}}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:120px 5% 80px}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(201,168,76,.05) 0%,transparent 70%),radial-gradient(ellipse 35% 35% at 15% 85%,rgba(74,144,217,.04) 0%,transparent 50%),radial-gradient(ellipse 35% 35% at 85% 85%,rgba(123,94,167,.04) 0%,transparent 50%)}
.hero-glass{position:relative;z-index:2;background:rgba(201,168,76,.02);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);border:1px solid rgba(201,168,76,.08);border-radius:36px;padding:70px 90px;max-width:820px;animation:heroIn 1.4s cubic-bezier(.22,1,.36,1) both;box-shadow:0 0 100px rgba(201,168,76,.03),inset 0 1px 0 rgba(255,255,255,.02)}
@keyframes heroIn{from{opacity:0;transform:translateY(50px) scale(.94);filter:blur(12px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
.hero-glass::before{content:'';position:absolute;inset:-1px;border-radius:37px;background:linear-gradient(135deg,rgba(201,168,76,.15) 0%,transparent 40%,transparent 60%,rgba(201,168,76,.08) 100%);z-index:-1}
.hero-glass::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(201,168,76,.04),transparent,transparent);animation:shimmerRotate 10s linear infinite;z-index:-1}
@keyframes shimmerRotate{to{transform:rotate(360deg)}}
.hero-logo-wrap{margin-bottom:28px;animation:logoAnim 1.2s cubic-bezier(.22,1,.36,1) .4s both}
@keyframes logoAnim{from{opacity:0;transform:scale(.7) rotateY(30deg)}to{opacity:1;transform:scale(1) rotateY(0)}}
.hero-logo-wrap svg{width:110px;height:110px;filter:drop-shadow(0 0 40px rgba(201,168,76,.25))}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(40px,7vw,68px);color:var(--gold);letter-spacing:8px;margin-bottom:10px;animation:titleAnim 1.2s cubic-bezier(.22,1,.36,1) .6s both}
@keyframes titleAnim{from{opacity:0;transform:translateY(25px);letter-spacing:24px}to{opacity:1;transform:translateY(0);letter-spacing:8px}}
.hero-line{width:70px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 28px;animation:lineGrow 1.2s ease .7s both}
@keyframes lineGrow{from{width:0;opacity:0}to{width:70px;opacity:1}}
.hero-sub{font-size:15px;color:var(--text-dim);max-width:500px;margin:0 auto;line-height:1.9;animation:fadeUp .9s ease .8s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hero-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:10px;animation:fadeUp 1s ease 1.3s both}
.hero-scroll span{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase}
.scroll-line{width:1px;height:45px;background:linear-gradient(180deg,var(--gold),transparent);animation:scrollPulse 2.5s ease-in-out infinite}
@keyframes scrollPulse{0%,100%{opacity:.2;transform:scaleY(.4);transform-origin:top}50%{opacity:1;transform:scaleY(1)}}

/* ========== CATEGORIES SECTION ========== */
.categories-section{padding:60px 5% 120px;max-width:1400px;margin:0 auto;position:relative;z-index:2}
.section-header{text-align:center;margin-bottom:70px}
.section-label{display:inline-flex;align-items:center;gap:10px;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.section-label::before,.section-label::after{content:'';width:40px;height:1px}
.section-label::before{background:linear-gradient(270deg,var(--gold),transparent)}
.section-label::after{background:linear-gradient(90deg,var(--gold),transparent)}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(30px,4vw,44px);margin-bottom:12px}
.section-sub{color:var(--text-dim);font-size:14px}

/* ========== PREMIUM CARDS ========== */
.color-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:28px;
  perspective:1200px;
}

.color-card{
  position:relative;
  background:var(--card-bg);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-radius:var(--radius);
  border:1px solid rgba(201,168,76,.06);
  overflow:hidden;
  cursor:pointer;
  opacity:0;
  transform:translateY(60px) rotateX(8deg);
  transition:transform .5s cubic-bezier(.22,1,.36,1),box-shadow .5s ease,border-color .4s ease;
  transform-style:preserve-3d;
}
.color-card.revealed{opacity:1;transform:translateY(0) rotateX(0)}

/* Animated gradient border */
.color-card::before{
  content:'';position:absolute;inset:-2px;border-radius:calc(var(--radius) + 2px);
  background:conic-gradient(from var(--angle,0deg),transparent 0%,rgba(201,168,76,.3) 8%,transparent 16%,transparent 50%,rgba(201,168,76,.2) 58%,transparent 66%);
  z-index:-1;opacity:0;transition:opacity .4s;
  animation:borderRotate 4s linear infinite paused;
}
.color-card:hover::before{opacity:1;animation-play-state:running}
@keyframes borderRotate{to{--angle:360deg}}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}

/* Shimmer effect */
.color-card::after{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.04),transparent);
  transform:skewX(-15deg);transition:left .6s ease;z-index:1;pointer-events:none;
}
.color-card:hover::after{left:160%}

.color-card:hover{
  border-color:rgba(201,168,76,.15);
  box-shadow:0 25px 80px rgba(0,0,0,.5),0 0 40px rgba(201,168,76,.06);
}

/* Card Image Area */
.card-visual{
  position:relative;height:260px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.card-visual-bg{
  position:absolute;inset:0;
  transition:transform .6s cubic-bezier(.22,1,.36,1);
}
.color-card:hover .card-visual-bg{transform:scale(1.08)}
.card-visual-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 40%,var(--card-bg) 100%);
}

/* Floating lens sphere */
.card-lens-sphere{
  position:relative;z-index:2;
  width:140px;height:140px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:transform .6s cubic-bezier(.22,1,.36,1),box-shadow .6s ease;
}
.card-lens-sphere::before{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:1px solid rgba(255,255,255,.08);
  animation:sphereRing 6s linear infinite;
}
@keyframes sphereRing{to{transform:rotate(360deg)}}
.card-lens-sphere::after{
  content:'';position:absolute;inset:20%;border-radius:50%;
  background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.15),transparent 60%);
}
.color-card:hover .card-lens-sphere{transform:scale(1.12) translateY(-8px)}

.card-lens-inner{
  width:120px;height:120px;border-radius:50%;
  box-shadow:inset 0 0 30px rgba(0,0,0,.3),0 0 30px rgba(0,0,0,.2);
}

/* Color dots row */
.card-dots{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:3;
}
.card-dot{
  width:22px;height:22px;border-radius:50%;
  border:2px solid rgba(255,255,255,.12);
  position:relative;overflow:hidden;
  transition:transform .3s,box-shadow .3s;
}
.card-dot::after{
  content:'';position:absolute;inset:30%;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);
}
.color-card:hover .card-dot{transform:scale(1.15);box-shadow:0 2px 12px rgba(0,0,0,.4)}
.card-dot:nth-child(1){transition-delay:.05s}
.card-dot:nth-child(2){transition-delay:.1s}
.card-dot:nth-child(3){transition-delay:.15s}
.card-dot:nth-child(4){transition-delay:.2s}

/* Card Content */
.card-content{position:relative;z-index:2;padding:24px 28px}
.card-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:50px;
  background:rgba(201,168,76,.08);
  border:1px solid rgba(201,168,76,.1);
  font-size:10px;color:var(--gold);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:14px;
}
.card-badge .badge-dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
.card-name{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:700;margin-bottom:8px;
  transition:color .3s;
}
.color-card:hover .card-name{color:var(--gold-light)}
.card-count{font-size:12px;color:var(--text-dim);margin-bottom:20px}

.card-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:16px;border-top:1px solid rgba(201,168,76,.06);
}
.card-price{font-size:14px;color:var(--text-dim)}
.card-price strong{font-size:20px;color:var(--gold);font-weight:700}

.card-btn{
  padding:10px 24px;border-radius:50px;
  background:linear-gradient(135deg,var(--gold),#b8943a);
  color:var(--bg);font-weight:700;font-size:12px;letter-spacing:1px;
  transition:all .3s;position:relative;overflow:hidden;
}
.card-btn::before{
  content:'';position:absolute;top:50%;left:50%;
  width:0;height:0;border-radius:50%;
  background:rgba(255,255,255,.25);
  transform:translate(-50%,-50%);
  transition:width .5s,height .5s;
}
.card-btn:hover::before{width:200px;height:200px}
.card-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,.3)}
.card-btn span{position:relative;z-index:1}

/* ========== LENS MODAL ========== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .4s;padding:20px;backdrop-filter:blur(12px)}
.modal-bg.open{opacity:1;visibility:visible}
.modal-box{background:rgba(12,10,10,.95);backdrop-filter:blur(40px);border-radius:var(--radius);width:100%;max-width:960px;max-height:90vh;overflow-y:auto;border:1px solid rgba(201,168,76,.08);transform:scale(.9) translateY(40px);transition:transform .6s cubic-bezier(.22,1,.36,1);box-shadow:0 40px 100px rgba(0,0,0,.6)}
.modal-bg.open .modal-box{transform:scale(1) translateY(0)}
.modal-header{padding:24px 36px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(201,168,76,.06);position:sticky;top:0;background:rgba(12,10,10,.98);z-index:2;backdrop-filter:blur(20px);border-radius:var(--radius) var(--radius) 0 0}
.modal-header h2{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold)}
.modal-close{width:44px;height:44px;border-radius:50%;background:rgba(201,168,76,.06);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .3s}
.modal-close:hover{background:var(--gold);color:var(--bg);transform:rotate(90deg)}

.slider-area{padding:40px 36px}
.lens-slider-container{position:relative;overflow:hidden;background:rgba(201,168,76,.015);border-radius:var(--radius);padding:44px 36px;border:1px solid rgba(201,168,76,.05)}
.lens-slider-track{display:flex;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.lens-slide{min-width:100%;display:flex;gap:48px;align-items:center;padding:0 10px}
.lens-visual{width:260px;height:260px;border-radius:50%;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;animation:lensGlow 4s ease-in-out infinite}
@keyframes lensGlow{0%,100%{box-shadow:0 0 50px rgba(201,168,76,.08)}50%{box-shadow:0 0 100px rgba(201,168,76,.15)}}
.lens-visual-ring{position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(255,255,255,.04);animation:ringRotate 12s linear infinite}
.lens-visual-ring::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
@keyframes ringRotate{to{transform:rotate(360deg)}}
.lens-visual-inner{width:220px;height:220px;border-radius:50%;position:relative;overflow:hidden;box-shadow:inset 0 0 50px rgba(0,0,0,.3)}
.lens-visual-inner::after{content:'';position:absolute;inset:18%;border-radius:50%;background:radial-gradient(circle,rgba(0,0,0,.15),transparent 65%)}
.lens-circle{width:100%;height:100%;border-radius:50%}

.lens-details{flex:1}
.lens-details h3{font-family:'Playfair Display',serif;font-size:30px;color:var(--text);margin-bottom:12px}
.lens-desc{font-size:15px;color:var(--text-dim);line-height:1.9;margin-bottom:28px}
.lens-meta{display:flex;gap:18px;margin-bottom:28px;flex-wrap:wrap}
.meta-item{background:rgba(201,168,76,.03);padding:16px 24px;border-radius:var(--radius-sm);border:1px solid rgba(201,168,76,.06);transition:border-color .3s}
.meta-item:hover{border-color:rgba(201,168,76,.15)}
.meta-item .label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px}
.meta-item .value{font-size:24px;font-weight:700;color:var(--gold);margin-top:6px}
.meta-item .value.stock-low{color:#ff9800}
.meta-item .value.stock-out{color:var(--danger)}

.qty-selector{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.qty-selector label{font-size:14px;color:var(--text-dim)}
.qty-ctrl{display:flex;align-items:center;gap:0;background:rgba(201,168,76,.04);border-radius:var(--radius-sm);border:1px solid rgba(201,168,76,.08);overflow:hidden}
.qty-ctrl button{width:46px;height:46px;background:rgba(201,168,76,.04);color:var(--gold);font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qty-ctrl button:hover{background:var(--gold);color:var(--bg)}
.qty-ctrl .qty-display{width:56px;text-align:center;font-size:20px;font-weight:700;color:var(--text)}

.add-lens-btn{padding:18px 44px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700;font-size:15px;transition:all .3s;display:inline-flex;align-items:center;gap:10px;position:relative;overflow:hidden}
.add-lens-btn::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.2);transform:translate(-50%,-50%);transition:width .6s,height .6s}
.add-lens-btn:hover::before{width:350px;height:350px}
.add-lens-btn:hover{transform:translateY(-3px);box-shadow:0 12px 35px rgba(201,168,76,.3)}
.add-lens-btn:disabled{background:var(--text-dim);opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.add-lens-btn span{position:relative;z-index:1}

.slider-nav{display:flex;justify-content:center;align-items:center;gap:24px;margin-top:36px}
.slider-nav button{width:52px;height:52px;border-radius:50%;background:rgba(201,168,76,.04);color:var(--gold);font-size:22px;transition:all .3s;display:flex;align-items:center;justify-content:center;border:1px solid rgba(201,168,76,.06)}
.slider-nav button:hover{background:var(--gold);color:var(--bg);transform:scale(1.1)}
.slider-nav button:disabled{opacity:.12;cursor:not-allowed;transform:none}
.slider-dots{display:flex;align-items:center;gap:10px}
.slider-dot{width:10px;height:10px;border-radius:50%;background:rgba(201,168,76,.12);transition:all .3s;cursor:pointer}
.slider-dot.active{background:var(--gold);transform:scale(1.5);box-shadow:0 0 14px rgba(201,168,76,.5)}

/* CART */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:3000;opacity:0;visibility:hidden;transition:all .3s}
.cart-overlay.open{opacity:1;visibility:visible}
.cart-panel{position:fixed;top:0;left:0;width:460px;max-width:100vw;height:100vh;background:rgba(10,8,8,.96);backdrop-filter:blur(40px);z-index:3001;transform:translateX(-100%);transition:transform .5s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;border-left:1px solid rgba(201,168,76,.06)}
.cart-panel.open{transform:translateX(0)}
.cart-top{padding:28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(201,168,76,.05)}
.cart-top h2{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold)}
.cart-items-list{flex:1;overflow-y:auto;padding:20px 28px}
.cart-empty{text-align:center;padding:80px 20px;color:var(--text-dim)}
.cart-empty .ce-icon{font-size:64px;margin-bottom:16px;opacity:.25}
.ci{display:flex;gap:16px;padding:20px 0;border-bottom:1px solid rgba(201,168,76,.03);animation:cartIn .5s ease both}
@keyframes cartIn{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
.ci-color{width:58px;height:58px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.06);box-shadow:0 4px 18px rgba(0,0,0,.3)}
.ci-info{flex:1}
.ci-name{font-size:15px;font-weight:600;margin-bottom:4px}
.ci-cat{font-size:11px;color:var(--text-dim);margin-bottom:12px}
.ci-bottom{display:flex;justify-content:space-between;align-items:center}
.ci-price{font-size:18px;font-weight:700;color:var(--gold)}
.ci-qty{display:flex;align-items:center;gap:8px}
.ci-qty button{width:30px;height:30px;border-radius:8px;background:rgba(201,168,76,.06);color:var(--gold);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;border:1px solid rgba(201,168,76,.08)}
.ci-qty button:hover{background:var(--gold);color:var(--bg)}
.ci-qty span{font-size:16px;font-weight:600;min-width:24px;text-align:center}
.ci-remove{background:none;color:rgba(231,76,60,.5);font-size:16px;padding:4px;transition:all .2s}
.ci-remove:hover{color:var(--danger);transform:scale(1.3)}

.cart-bottom{padding:32px;border-top:1px solid rgba(201,168,76,.05)}
.cb-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px;color:var(--text-dim)}
.cb-row.total{font-size:24px;font-weight:700;color:var(--gold);padding-top:16px;border-top:1px solid rgba(201,168,76,.08);margin-top:12px}
.checkout-btn{width:100%;padding:18px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700;font-size:15px;margin-top:18px;transition:all .3s;position:relative;overflow:hidden}
.checkout-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,168,76,.3)}
.checkout-btn:disabled{background:var(--text-dim);opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* INVOICE */
.inv-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:4000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .3s;padding:20px;backdrop-filter:blur(12px)}
.inv-overlay.open{opacity:1;visibility:visible}
.inv-box{background:#faf8f5;color:#222;border-radius:var(--radius);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:44px;transform:scale(.9);transition:transform .6s cubic-bezier(.22,1,.36,1);box-shadow:0 30px 80px rgba(0,0,0,.5)}
.inv-overlay.open .inv-box{transform:scale(1)}
.inv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:24px;border-bottom:2px solid var(--gold)}
.inv-brand{font-family:'Playfair Display',serif;font-size:30px;color:var(--gold)}
.inv-brand small{display:block;font-size:11px;color:#999;font-family:'Inter',sans-serif;margin-top:4px}
.inv-info{text-align:left;font-size:12px;color:#888;line-height:2.2}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.inv-table th{background:var(--gold);color:var(--bg);padding:12px 14px;font-size:11px;text-align:right;font-weight:700}
.inv-table td{padding:12px 14px;border-bottom:1px solid #eee;font-size:13px;text-align:right}
.inv-color-dot{display:inline-block;width:14px;height:14px;border-radius:50%;vertical-align:middle;border:1px solid rgba(0,0,0,.1);margin-left:6px}
.inv-totals{text-align:left}
.inv-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px}
.inv-total{font-size:24px;font-weight:700;color:var(--gold);border-top:2px solid var(--gold);padding-top:14px;margin-top:10px}
.inv-actions{display:flex;gap:14px;margin-top:28px;justify-content:center}
.inv-btn{padding:14px 32px;border-radius:var(--radius-sm);font-weight:700;font-size:14px;transition:all .3s}
.inv-print{background:var(--gold);color:var(--bg)}
.inv-print:hover{background:var(--gold-light)}
.inv-done{background:#eee;color:#333}
.inv-done:hover{background:#ddd}

/* TOAST */
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(120px);background:rgba(18,14,12,.95);backdrop-filter:blur(20px);border:1px solid rgba(201,168,76,.15);color:var(--text);padding:18px 36px;border-radius:var(--radius-sm);font-size:14px;z-index:9999;transition:transform .6s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;gap:12px;white-space:nowrap;box-shadow:0 12px 50px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}

.footer{text-align:center;padding:50px 5%;border-top:1px solid rgba(201,168,76,.04);color:var(--text-dim);font-size:13px;position:relative;z-index:2}

/* RESPONSIVE */
@media(max-width:1024px){.color-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .hero-glass{padding:40px 28px;border-radius:28px}
  .hero-logo-wrap svg{width:80px;height:80px}
  .color-grid{grid-template-columns:1fr;gap:20px}
  .card-visual{height:220px}
  .card-lens-sphere{width:120px;height:120px}
  .card-lens-inner{width:100px;height:100px}
  .lens-slide{flex-direction:column;text-align:center}
  .lens-visual{width:200px;height:200px}
  .lens-visual-inner{width:170px;height:170px}
  .lens-meta{justify-content:center}
  .qty-selector{justify-content:center}
  .add-lens-btn{margin:0 auto}
  .slider-area{padding:24px 16px}
  .lens-slider-container{padding:28px 16px}
  .cart-panel{width:100%}
  .inv-box{padding:28px}
  .modal-box{max-height:95vh}
}
@media(max-width:480px){
  .hero-glass{padding:32px 20px}
  .card-content{padding:20px 22px}
}

@media print{body *{visibility:hidden}.inv-box,.inv-box *{visibility:visible}.inv-box{position:absolute;top:0;left:0;width:100%;padding:20px}.inv-actions{display:none!important}}
</style>
</head>
<body>

<div class="ambient"><div class="ambient-orb"></div><div class="ambient-orb"></div><div class="ambient-orb"></div></div>
<canvas id="particlesCanvas"></canvas>

<!-- NAV -->
<nav class="nav" id="mainNav">
  <div class="nav-logo">
    <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="#c9a84c" stroke-width="1" opacity=".3"/><circle cx="20" cy="20" r="12" stroke="#c9a84c" stroke-width=".5" opacity=".2"/><circle cx="20" cy="20" r="8" fill="url(#lg1)" opacity=".7"/><circle cx="20" cy="20" r="3" fill="#c9a84c" opacity=".5"/><defs><radialGradient id="lg1" cx="40%" cy="35%"><stop offset="0%" stop-color="#e8d5a3"/><stop offset="100%" stop-color="#8B7355"/></radialGradient></defs></svg>
    <div>LENSORA<span>عدسات ملونة فاخرة</span></div>

<!-- HERO -->
<header class="hero">
  <div class="hero-bg"></div>
  <div class="hero-glass">
    <div class="hero-logo-wrap">
      <svg viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="60" r="55" stroke="#c9a84c" stroke-width=".8" opacity=".15"/>
        <circle cx="60" cy="60" r="48" stroke="#c9a84c" stroke-width=".4" opacity=".08"/>
        <circle cx="60" cy="60" r="40" fill="url(#hg1)"/>
        <circle cx="60" cy="60" r="40" stroke="#c9a84c" stroke-width="1.2" opacity=".5"/>
        <circle cx="60" cy="60" r="28" stroke="#c9a84c" stroke-width=".4" opacity=".2"/>
        <circle cx="60" cy="60" r="20" fill="url(#hg2)" opacity=".8"/>

        <defs>
          <radialGradient id="hg1" cx="35%" cy="30%"><stop offset="0%" stop-color="#d4a84c" stop-opacity=".25"/><stop offset="50%" stop-color="#8B5E3C" stop-opacity=".45"/><stop offset="100%" stop-color="#3a2510" stop-opacity=".65"/></radialGradient>
          <radialGradient id="hg2" cx="30%" cy="25%"><stop offset="0%" stop-color="#e8d5a3" stop-opacity=".55"/><stop offset="60%" stop-color="#a8844c" stop-opacity=".35"/><stop offset="100%" stop-color="#5a3a1a" stop-opacity=".75"/></radialGradient>

  </div>
  <div class="hero-scroll"><span>اكتشفي</span><div class="scroll-line"></div></div>
</header>

<!-- CATEGORIES -->
<section class="categories-section">
  <div class="section-header">
    <div class="section-label">👁️ مجموعتنا</div>
    <h2 class="section-title">اختاري لونك المفضل</h2>
    <p class="section-sub">كل لون يحتوي على تدرجات متعددة — اكتشفيها بنفسك</p>
  </div>
  <div class="color-grid" id="colorGrid"></div>
</section>

<!-- LENS MODAL -->
<div class="modal-bg" id="lensModal">
  <div class="modal-box">
    <div class="modal-header"><h2 id="modalTitle"></h2><button class="modal-close" onclick="closeLensModal()">✕</button></div>
    <div class="slider-area">
      <div class="lens-slider-container"><div class="lens-slider-track" id="lensTrack"></div></div>
      <div class="slider-nav">
        <button onclick="slideMove(-1)" id="prevBtn">→</button>
        <div class="slider-dots" id="sliderDots"></div>
        <button onclick="slideMove(1)" id="nextBtn">←</button>
      </div>
    </div>
  </div>
</div>

<!-- CART -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-top"><h2>🛒 سلة المشتريات</h2><button class="modal-close" onclick="closeCart()">✕</button></div>
  <div class="cart-items-list" id="cartItemsList"></div>
  <div class="cart-bottom" id="cartBottom"></div>
</div>

<!-- INVOICE -->
<div class="inv-overlay" id="invOverlay"><div class="inv-box" id="invBox"></div></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<div class="footer">© 2025 LENSORA — جميع الحقوق محفوظة ✨</div>

<script>
const COLORS_DATA=[
  {id:'brown',arName:'بني دافئ',swatch:'#8B5E3C',lenses:[
    {id:'b1',name:'عسل ذهبي',desc:'تدرج عسلي دافئ مع حلقة خارجية ناعمة',price:85,stock:30,color:'#D4A056',gradient:'radial-gradient(circle at 40% 35%,#D4A056,#8B5E3C,#5C3A1E)'},
    {id:'b2',name:'شوكولاتة',desc:'بني غامق عميق يعطي نظرة ساحرة',price:95,stock:22,color:'#5C3A1E',gradient:'radial-gradient(circle at 40% 35%,#7B5230,#4A2A10,#2E1808)'},
    {id:'b3',name:'كراميل',desc:'بني فاتح كريمي مثالي',price:90,stock:18,color:'#C68642',gradient:'radial-gradient(circle at 40% 35%,#C68642,#8B5E3C,#5C3A1E)'},
    {id:'b4',name:'بندق',desc:'بني متوسط مع لمسات ذهبية',price:88,stock:0,color:'#8B7355',gradient:'radial-gradient(circle at 40% 35%,#A0845C,#7B6B4F,#5A4D36)'}
  ]},
  {id:'blue',arName:'أزرق ساحر',swatch:'#4A90D9',lenses:[
    {id:'bl1',name:'محيط',desc:'أزرق محيطي عميق مع لمعة طبيعية',price:110,stock:25,color:'#2E6CB5',gradient:'radial-gradient(circle at 40% 35%,#5B9BD5,#2E6CB5,#1B3A5C)'},
    {id:'bl2',name:'سماء',desc:'أزرق سماوي فاتح براقة',price:100,stock:15,color:'#87CEEB',gradient:'radial-gradient(circle at 40% 35%,#87CEEB,#5BA3D9,#3A7BBF)'},
    {id:'bl3',name:'ثلجي',desc:'أزرق فاتح ثلجي مذهل',price:120,stock:8,color:'#B8D4E8',gradient:'radial-gradient(circle at 40% 35%,#D0E4F0,#A8C8DC,#7BAFC8)'},
    {id:'bl4',name:'زفير',desc:'أزرق بنفسجي غامض',price:115,stock:12,color:'#5B6CBF',gradient:'radial-gradient(circle at 40% 35%,#7B8CDF,#4A5AAF,#2E3A7B)'}
  ]},
  {id:'green',arName:'أخضر زمردي',swatch:'#5CAB68',lenses:[
    {id:'g1',name:'زيتون',desc:'أخضر زيتوني ناعم',price:105,stock:20,color:'#6B8E4E',gradient:'radial-gradient(circle at 40% 35%,#8BA85C,#6B8E4E,#4A6B32)'},
    {id:'g2',name:'زمردي',desc:'أخضر زمردي فاخر لامع',price:130,stock:10,color:'#2E8B57',gradient:'radial-gradient(circle at 40% 35%,#3CB371,#2E8B57,#1B5E3B)'},
    {id:'g3',name:'فيروزي',desc:'أخضر فيروزي مائي منعش',price:115,stock:5,color:'#40B5A5',gradient:'radial-gradient(circle at 40% 35%,#5CD4C4,#40B5A5,#2A8A7B)'},
    {id:'g4',name:'غابة',desc:'أخضر غامق غامض',price:108,stock:14,color:'#2E6B3B',gradient:'radial-gradient(circle at 40% 35%,#3E8B4B,#2E6B3B,#1B4B28)'}
  ]},
  {id:'gray',arName:'رمادي أنيق',swatch:'#8A8A8A',lenses:[
    {id:'gr1',name:'فضي',desc:'رمادي فضي لامع أنيق',price:100,stock:28,color:'#B8B8B8',gradient:'radial-gradient(circle at 40% 35%,#D0D0D0,#A8A8A8,#787878)'},
    {id:'gr2',name:'فحمي',desc:'رمادي فحمي قوي',price:95,stock:16,color:'#4A4A4A',gradient:'radial-gradient(circle at 40% 35%,#6A6A6A,#3A3A3A,#202020)'},
    {id:'gr3',name:'دخاني',desc:'رمادي دخاني بلمسة بنفسجية',price:105,stock:7,color:'#6B6B7B',gradient:'radial-gradient(circle at 40% 35%,#8B8B9B,#6B6B7B,#4A4A5A)'}
  ]},
  {id:'hazel',arName:'عسلي مميز',swatch:'#A0845C',lenses:[
    {id:'hz1',name:'لوز',desc:'عسلي لوزي فاتح طبيعي',price:95,stock:32,color:'#C4A265',gradient:'radial-gradient(circle at 40% 35%,#D4B878,#C4A265,#8B7355)'},
    {id:'hz2',name:'نحاسي',desc:'عسلي نحاسي دافئ ببريق',price:100,stock:20,color:'#B87333',gradient:'radial-gradient(circle at 40% 35%,#D4944A,#B87333,#7B4A1E)'},
    {id:'hz3',name:'ذهبي',desc:'عسلي ذهبي لامع',price:110,stock:3,color:'#D4A056',gradient:'radial-gradient(circle at 40% 35%,#E8C070,#D4A056,#8B6A32)'}
  ]},
  {id:'purple',arName:'بنفسجي ملكي',swatch:'#7B5EA7',lenses:[
    {id:'p1',name:'لافندر',desc:'بنفسجي لافندر رومانسي',price:110,stock:18,color:'#A88BC5',gradient:'radial-gradient(circle at 40% 35%,#C5A8DC,#A88BC5,#7B5EA7)'},
    {id:'p2',name:'أرجواني',desc:'بنفسجي غامق ملكي',price:120,stock:11,color:'#6B3FA0',gradient:'radial-gradient(circle at 40% 35%,#8B5FC0,#6B3FA0,#4B2A70)'},
    {id:'p3',name:'ليلكي',desc:'بنفسجي فاتح ليلكي',price:115,stock:6,color:'#9B7FBF',gradient:'radial-gradient(circle at 40% 35%,#B89FD4,#9B7FBF,#7B5FA0)'}
  ]}
];

let products=JSON.parse(localStorage.getItem('lensora_products'))||initProducts();
let cart=JSON.parse(localStorage.getItem('lensora_cart'))||[];
let orders=JSON.parse(localStorage.getItem('lensora_orders'))||[];
let currentColorIdx=0,currentLensIdx=0;

function initProducts(){let p=[];COLORS_DATA.forEach(c=>c.lenses.forEach(l=>p.push({...l,categoryId:c.id,categoryName:c.arName})));return p}
function saveData(){localStorage.setItem('lensora_products',JSON.stringify(products));localStorage.setItem('lensora_cart',JSON.stringify(cart));localStorage.setItem('lensora_orders',JSON.stringify(orders))}
function getProd(id){return products.find(p=>p.id===id)}

/* ========== RENDER CARDS ========== */
function renderCategories(){
  const grid=document.getElementById('colorGrid');
  grid.innerHTML=COLORS_DATA.map((c,ci)=>{
    const totalStock=c.lenses.reduce((s,l)=>s+getProd(l.id).stock,0);
    const dots=c.lenses.map(l=>`<div class="card-dot" style="background:${l.gradient}"></div>`).join('');
    const mainLens=c.lenses[0];
    const sphereGrad=mainLens.gradient;
    return `
      <div class="color-card" data-card data-delay="${ci*.12}">
        <div class="card-visual">
          <div class="card-visual-bg" style="background:radial-gradient(ellipse at 50% 40%,${mainLens.color}22 0%,transparent 60%),linear-gradient(180deg,rgba(18,14,12,0) 0%,var(--card-bg) 100%)"></div>
          <div class="card-lens-sphere">
            <div class="card-lens-inner" style="background:${sphereGrad}"></div>
          </div>
          <div class="card-dots">${dots}</div>
        </div>
        <div class="card-content">
          <div class="card-badge"><span class="badge-dot"></span>${c.arName}</div>
          <div class="card-name">${c.lenses[0].name}</div>
          <div class="card-count">${c.lenses.length} تدرجات · ${totalStock} قطعة متاحة</div>
          <div class="card-footer">
            <div class="card-price">يبدأ من <strong>${getProd(c.lenses[0].id).price} ر.س</strong></div>
            <button class="card-btn" onclick="openLensModal(${ci})"><span>تصفحي ←</span></button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  // Staggered reveal
  requestAnimationFrame(()=>{
    const cards=document.querySelectorAll('[data-card]');
    cards.forEach((card,i)=>{
      const delay=parseFloat(card.getAttribute('data-delay'))*1000+i*80;
      setTimeout(()=>card.classList.add('revealed'),delay);
    });
  });
}

/* ========== LENS MODAL ========== */
function openLensModal(ci){
  currentColorIdx=ci;currentLensIdx=0;
  document.getElementById('modalTitle').textContent=COLORS_DATA[ci].arName;
  renderSlider();
  document.getElementById('lensModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLensModal(){document.getElementById('lensModal').classList.remove('open');document.body.style.overflow=''}

function renderSlider(){
  const cat=COLORS_DATA[currentColorIdx];
  document.getElementById('lensTrack').innerHTML=cat.lenses.map((l,li)=>{
    const p=getProd(l.id);
    const sc=p.stock===0?'stock-out':p.stock<=5?'stock-low':'';
    const st=p.stock===0?'نفذ من المخزن':p.stock<=5?`باقي ${p.stock} فقط!`:`${p.stock} قطعة`;
    return `
      <div class="lens-slide">
        <div class="lens-visual">
          <div class="lens-visual-ring"></div>
          <div class="lens-visual-inner"><div class="lens-circle" style="background:${l.gradient};box-shadow:0 0 60px ${l.color}25"></div></div>
        </div>
        <div class="lens-details">
          <h3>${l.name}</h3>
          <p class="lens-desc">${l.desc}</p>
          <div class="lens-meta">
            <div class="meta-item"><div class="label">السعر</div><div class="value">${l.price} ر.س</div></div>
            <div class="meta-item"><div class="label">المتاح</div><div class="value ${sc}">${st}</div></div>
          </div>
          <div class="qty-selector">
            <label>الكمية:</label>
            <div class="qty-ctrl">
              <button onclick="changeModalQty(-1,${li})">−</button>
              <div class="qty-display" id="mq_${li}">1</div>
              <button onclick="changeModalQty(1,${li})">+</button>
            </div>
          </div>
          <button class="add-lens-btn" onclick="addFromSlider('${l.id}',${li})" ${p.stock===0?'disabled':''}>
            <span>${p.stock===0?' غير متوفر':'🛒  أضف للسلة'}</span>
          </button>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('sliderDots').innerHTML=cat.lenses.map((_,li)=>`<div class="slider-dot ${li===currentLensIdx?'active':''}" onclick="goToSlide(${li})"></div>`).join('');
  updateSliderPos();
}

function updateSliderPos(){
  document.getElementById('lensTrack').style.transform=`translateX(${currentLensIdx*100}%)`;
  document.querySelectorAll('.slider-dot').forEach((d,i)=>d.classList.toggle('active',i===currentLensIdx));
  const cat=COLORS_DATA[currentColorIdx];
  document.getElementById('prevBtn').disabled=currentLensIdx===0;
  document.getElementById('nextBtn').disabled=currentLensIdx>=cat.lenses.length-1;
}
function slideMove(dir){const cat=COLORS_DATA[currentColorIdx];currentLensIdx=Math.max(0,Math.min(cat.lenses.length-1,currentLensIdx+dir));updateSliderPos()}
function goToSlide(i){currentLensIdx=i;updateSliderPos()}

function changeModalQty(delta,li){
  const el=document.getElementById(`mq_${li}`);
  let v=parseInt(el.textContent)+delta;
  const p=getProd(COLORS_DATA[currentColorIdx].lenses[li].id);
  v=Math.max(1,Math.min(v,Math.max(1,p.stock)));
  el.textContent=v;
}

function addFromSlider(lensId,li){
  const p=getProd(lensId);if(!p||p.stock<=0)return;
  const qty=parseInt(document.getElementById(`mq_${li}`).textContent);
  const inCart=cart.find(c=>c.productId===lensId);
  const current=inCart?inCart.qty:0;
  if(current+qty>p.stock){showToast('⚠️ الكمية تتجاوز المتاح');return}
  if(inCart)inCart.qty+=qty;else cart.push({productId:lensId,qty});
  saveData();updateCartBadge();
  showToast(`✅ تمت إضافة "${p.name}" (${qty} قطعة)`);
  document.getElementById(`mq_${li}`).textContent='1';
  renderSlider();
}

/* ========== CART ========== */
function updateCartBadge(){
  const t=cart.reduce((s,c)=>s+c.qty,0);
  const b=document.getElementById('cartBadge');
  b.textContent=t;b.style.display=t>0?'flex':'none';
}
function openCart(){document.getElementById('cartOverlay').classList.add('open');document.getElementById('cartPanel').classList.add('open');renderCart()}
function closeCart(){document.getElementById('cartOverlay').classList.remove('open');document.getElementById('cartPanel').classList.remove('open')}

function renderCart(){
  const list=document.getElementById('cartItemsList');
  const bottom=document.getElementById('cartBottom');
  if(cart.length===0){list.innerHTML=`<div class="cart-empty"><div class="ce-icon">👁️</div><p>السلة فارغة</p><p style="font-size:13px;margin-top:8px">تصفحي الألوان وأضيفي عدساتك!</p></div>`;bottom.innerHTML='';return}
  list.innerHTML=cart.map(c=>{
    const p=getProd(c.productId);if(!p)return'';
    return `<div class="ci">
      <div class="ci-color" style="background:${p.gradient}"></div>
      <div class="ci-info">
        <div class="ci-name">${p.name}</div>
        <div class="ci-cat">${p.categoryName}</div>
        <div class="ci-bottom">
          <span class="ci-price">${p.price*c.qty} ر.س</span>
          <div class="ci-qty">
            <button onclick="changeCartQty('${c.productId}',-1)">−</button>
            <span>${c.qty}</span>
            <button onclick="changeCartQty('${c.productId}',1)">+</button>
          </div>
        </div>
      </div>
      <button class="ci-remove" onclick="removeFromCart('${c.productId}')">🗑</button>
    </div>`;
  }).join('');
  const sub=cart.reduce((s,c)=>{const p=getProd(c.productId);return s+(p?p.price*c.qty:0)},0);
  const ship=sub>=200?0:15;
  const total=sub+ship;
  bottom.innerHTML=`
    <div class="cb-row"><span>المجموع</span><span>${sub} ر.س</span></div>
    <div class="cb-row"><span>الشحن ${ship===0?'(مجاني)':''}</span><span>${ship===0?'مجاني':ship+' ر.س'}</span></div>
    <div class="cb-row total"><span>الإجمالي</span><span>${total} ر.س</span></div>
    <button class="checkout-btn" onclick="checkout()">🧾 إتمام الشراء وإصدار الفاتورة</button>
  `;
}

function changeCartQty(pid,delta){
  const item=cart.find(c=>c.productId===pid);const p=getProd(pid);
  if(!item||!p)return;item.qty+=delta;
  if(item.qty<=0){removeFromCart(pid);return}
  if(item.qty>p.stock){item.qty=p.stock;showToast('⚠️ الحد الأقصى')}
  saveData();updateCartBadge();renderCart();
}
function removeFromCart(pid){cart=cart.filter(c=>c.productId!==pid);saveData();updateCartBadge();renderCart()}

/* ========== CHECKOUT ========== */
function checkout(){
  if(cart.length===0)return;
  cart.forEach(c=>{const p=getProd(c.productId);if(p)p.stock=Math.max(0,p.stock-c.qty)});
  let sub=0;
  const items=cart.map(c=>{const p=getProd(c.productId);const line=p.price*c.qty;sub+=line;return{name:p.name,category:p.categoryName,price:p.price,qty:c.qty,lineTotal:line,color:p.color,gradient:p.gradient}});
  const ship=sub>=200?0:15;const total=sub+ship;
  const order={id:'LSR-'+Date.now().toString(36).toUpperCase(),date:new Date().toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}),items,sub,ship,total,status:'completed'};
  orders.push(order);saveData();showInvoice(order);
  cart=[];saveData();updateCartBadge();closeCart();renderCategories();
  showToast('✅ تم الشراء بنجاح!');
}

/* ========== INVOICE ========== */
function showInvoice(order){
  document.getElementById('invBox').innerHTML=`
    <div class="inv-top"><div class="inv-brand">LENSORA<small>عدسات ملونة فاخرة</small></div>
    <div class="inv-info"><div>فاتورة #: <strong>${order.id}</strong></div><div>التاريخ: ${order.date}</div><div>الحالة: ✅ مكتمل</div></div></div>
    <table class="inv-table"><thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>الإجمالي</th></tr></thead>
    <tbody>${order.items.map(it=>`<tr><td><span class="inv-color-dot" style="background:${it.gradient}"></span>${it.name}<br><small style="color:#999">${it.category}</small></td><td>${it.price} ر.س</td><td>${it.qty}</td><td><strong>${it.lineTotal} ر.س</strong></td></tr>`).join('')}</tbody></table>
    <div class="inv-totals">
      <div class="inv-row"><span>المجموع</span><span>${order.sub} ر.س</span></div>
      <div class="inv-row"><span>الشحن</span><span>${order.ship===0?'مجاني':order.ship+' ر.س'}</span></div>
      <div class="inv-total"><span>الإجمالي</span><span>${order.total} ر.س</span></div>
    </div>
    <div class="inv-actions"><button class="inv-btn inv-print" onclick="window.print()">🖨️ طباعة</button><button class="inv-btn inv-done" onclick="closeInvoice()">إغلاق</button></div>
  `;
  document.getElementById('invOverlay').classList.add('open');
}
function closeInvoice(){document.getElementById('invOverlay').classList.remove('open')}

/* ========== TOAST ========== */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

/* ========== KEYBOARD ========== */
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLensModal();closeCart();closeInvoice()}});

/* ========== PARTICLES ========== */
const canvas=document.getElementById('particlesCanvas');const ctx=canvas.getContext('2d');let particles=[];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resizeCanvas();window.addEventListener('resize',resizeCanvas);
class Particle{constructor(){this.reset()}
reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*1.5+.5;this.sx=(Math.random()-.5)*.25;this.sy=(Math.random()-.5)*.15;this.op=Math.random()*.35+.08;this.pulse=Math.random()*Math.PI*2;this.ps=Math.random()*.02+.005}
update(){this.x+=this.sx;this.y+=this.sy;this.pulse+=this.ps;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.reset()}
draw(){const a=this.op*(.5+.5*Math.sin(this.pulse));ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`rgba(201,168,76,${a})`;ctx.fill()}}
for(let i=0;i<60;i++)particles.push(new Particle());
(function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(anim)})();

/* ========== NAV SCROLL ========== */
window.addEventListener('scroll',()=>{document.getElementById('mainNav').classList.toggle('scrolled',window.scrollY>60)});

/* ========== INIT ========== */
renderCategories();updateCartBadge();
</script>
</body>
</html>
