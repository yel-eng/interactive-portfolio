<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lensora — عالم العدسات الملونة</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/index.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.1.0/index.min.css">
<style>
:root{
  --bg:#060404;
  --card:rgba(18,16,16,.6);
  --card-solid:#121010;
  --gold:#c9a84c;
  --gold-light:#e8d5a3;
  --gold-glow:rgba(201,168,76,.15);
  --text:#f5ede0;
  --text-dim:#6b6058;
  --radius:20px;
  --radius-sm:12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
button{cursor:pointer;border:none;font-family:inherit}

/* ========== AMBIENT BACKGROUND ========== */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient-orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.08}
.ambient-orb:nth-child(1){width:500px;height:500px;background:#c9a84c;top:-10%;right:-10%;animation:floatOrb1 20s ease-in-out infinite}
.ambient-orb:nth-child(2){width:400px;height:400px;background:#4A90D9;bottom:-5%;left:-5%;animation:floatOrb2 25s ease-in-out infinite}
.ambient-orb:nth-child(3){width:300px;height:300px;background:#7B5EA7;top:50%;left:50%;animation:floatOrb3 18s ease-in-out infinite}
@keyframes floatOrb1{0%,100%{transform:translate(0,0)}33%{transform:translate(-80px,60px)}66%{transform:translate(40px,-40px)}}
@keyframes floatOrb2{0%,100%{transform:translate(0,0)}33%{transform:translate(60px,-50px)}66%{transform:translate(-40px,30px)}}
@keyframes floatOrb3{0%,100%{transform:translate(-50%,-50%)}33%{transform:translate(calc(-50% + 50px),calc(-50% - 30px))}66%{transform:translate(calc(-50% - 30px),calc(-50% + 60px))}}

/* ========== PARTICLES CANVAS ========== */
#particlesCanvas{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.4}

/* ========== NAV ========== */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:16px 5%;display:flex;align-items:center;justify-content:space-between;
  background:rgba(6,4,4,.3);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(201,168,76,.06);
  transition:background .4s,padding .4s;
}
.nav.scrolled{background:rgba(6,4,4,.8);padding:12px 5%}
.nav-logo{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);letter-spacing:4px;display:flex;align-items:center;gap:10px}
.nav-logo svg{width:28px;height:28px}
.nav-logo span{font-size:10px;letter-spacing:3px;color:var(--text-dim);font-family:'Inter',sans-serif;display:block;font-weight:400}
.nav-actions{display:flex;gap:12px;align-items:center}
.cart-btn{
  background:rgba(201,168,76,.08);color:var(--gold);
  padding:10px 18px;border-radius:50px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;border:1px solid rgba(201,168,76,.1);
  transition:.3s;position:relative;backdrop-filter:blur(10px);
}
.cart-btn:hover{background:var(--gold);color:var(--bg)}
.cart-badge{
  background:var(--danger);color:#fff;
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
  position:absolute;top:-6px;left:-6px;
  animation:popIn .3s ease;
}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}

/* ========== HERO ========== */
.hero{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;position:relative;overflow:hidden;padding:120px 5% 80px;
}
.hero-bg-gradient{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(201,168,76,.06) 0%,transparent 70%),
             radial-gradient(ellipse 40% 40% at 20% 80%,rgba(74,144,217,.04) 0%,transparent 50%),
             radial-gradient(ellipse 40% 40% at 80% 80%,rgba(123,94,167,.04) 0%,transparent 50%);
  z-index:0;
}
.hero-grid{
  position:absolute;inset:0;z-index:0;opacity:.03;
  background-image:
    linear-gradient(rgba(201,168,76,.3) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,168,76,.3) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse at center,black 20%,transparent 70%);
}

/* Glass Card */
.hero-glass{
  position:relative;z-index:2;
  background:rgba(201,168,76,.03);
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(201,168,76,.1);
  border-radius:32px;
  padding:60px 80px;
  max-width:800px;
  animation:glassIn 1.2s cubic-bezier(.22,1,.36,1) both;
  box-shadow:
    0 0 80px rgba(201,168,76,.03),
    inset 0 1px 0 rgba(255,255,255,.03);
}
@keyframes glassIn{
  from{opacity:0;transform:translateY(40px) scale(.95);filter:blur(10px)}
  to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}

.hero-glass::before{
  content:'';position:absolute;inset:-1px;border-radius:33px;
  background:linear-gradient(135deg,rgba(201,168,76,.2) 0%,transparent 40%,transparent 60%,rgba(201,168,76,.1) 100%);
  z-index:-1;
}
.hero-glass::after{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:conic-gradient(from 0deg,transparent,rgba(201,168,76,.05),transparent,transparent);
  animation:shimmerRotate 8s linear infinite;z-index:-1;
}
@keyframes shimmerRotate{to{transform:rotate(360deg)}}

/* Hero SVG Logo */
.hero-logo-wrap{
  margin-bottom:24px;
  animation:logoIn 1s cubic-bezier(.22,1,.36,1) .3s both;
}
@keyframes logoIn{from{opacity:0;transform:scale(.8) rotateY(20deg)}to{opacity:1;transform:scale(1) rotateY(0)}}
.hero-logo-wrap svg{width:100px;height:100px;filter:drop-shadow(0 0 30px rgba(201,168,76,.3))}

.hero-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(36px,6vw,64px);color:var(--gold);
  letter-spacing:8px;margin-bottom:8px;
  animation:titleIn 1s cubic-bezier(.22,1,.36,1) .5s both;
}
@keyframes titleIn{from{opacity:0;transform:translateY(20px);letter-spacing:20px}to{opacity:1;transform:translateY(0);letter-spacing:8px}}

.hero-subtitle{
  font-size:15px;color:var(--text-dim);max-width:500px;
  margin:0 auto 32px;line-height:1.8;
  animation:fadeUp .8s ease .7s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.hero-line{
  width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:0 auto 24px;animation:lineGrow 1s ease .6s both;
}
@keyframes lineGrow{from{width:0}to{width:60px}}

.hero-scroll{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:fadeUp 1s ease 1.2s both;
}
.hero-scroll span{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase}
.scroll-line{
  width:1px;height:40px;background:linear-gradient(180deg,var(--gold),transparent);
  animation:scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse{0%,100%{opacity:.3;transform:scaleY(.5)}50%{opacity:1;transform:scaleY(1)}}

/* ========== CATEGORIES ========== */
.categories-section{padding:40px 5% 100px;max-width:1400px;margin:0 auto;position:relative;z-index:2}
.section-label{
  display:inline-flex;align-items:center;gap:8px;
  font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);
  margin-bottom:12px;
}
.section-label::before,.section-label::after{
  content:'';width:30px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));
}
.section-label::before{background:linear-gradient(90deg,var(--gold),transparent)}
.section-title{
  font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,40px);color:var(--text);
  margin-bottom:8px;
}
.section-sub{text-align:center;color:var(--text-dim);font-size:14px;margin-bottom:56px}

.color-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:24px;
}

.color-card{
  background:var(--card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:var(--radius);overflow:hidden;
  border:1px solid rgba(201,168,76,.06);
  transition:transform .4s,box-shadow .4s,border-color .4s;
  cursor:pointer;position:relative;
  opacity:0;transform:translateY(40px);
}
.color-card.visible{opacity:1;transform:translateY(0);transition:opacity .6s ease,transform .6s ease}
.color-card::before{
  content:'';position:absolute;inset:0;border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(201,168,76,.04) 0%,transparent 50%);
  opacity:0;transition:opacity .4s;z-index:0;pointer-events:none;
}
.color-card:hover::before{opacity:1}
.color-card:hover{transform:translateY(-8px);box-shadow:0 20px 60px rgba(0,0,0,.4);border-color:rgba(201,168,76,.15)}

.color-card-header{
  padding:28px;display:flex;align-items:center;gap:16px;
  border-bottom:1px solid rgba(201,168,76,.06);position:relative;z-index:1;
}
.color-swatch{
  width:52px;height:52px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,.06);
  box-shadow:0 0 20px rgba(0,0,0,.3);
  transition:transform .3s,box-shadow .3s;
  position:relative;
}
.color-swatch::after{
  content:'';position:absolute;inset:3px;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);
}
.color-card:hover .color-swatch{transform:scale(1.1);box-shadow:0 0 30px rgba(201,168,76,.2)}
.color-card-header h3{font-size:20px;font-weight:600;color:var(--text)}
.color-card-header span{font-size:12px;color:var(--text-dim);margin-top:2px}

.color-card-body{padding:24px;position:relative;z-index:1}
.color-preview{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.color-dot{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,.06);
  transition:transform .3s,box-shadow .3s;position:relative;
  overflow:hidden;
}
.color-dot::after{
  content:'';position:absolute;inset:25%;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,255,255,.25),transparent);
}
.color-dot:hover{transform:scale(1.25);box-shadow:0 4px 20px rgba(0,0,0,.4)}

.color-card-footer{
  padding:16px 28px;display:flex;justify-content:space-between;align-items:center;
  border-top:1px solid rgba(201,168,76,.04);position:relative;z-index:1;
}
.color-card-footer span{font-size:13px;color:var(--text-dim)}
.open-btn{
  padding:10px 24px;border-radius:50px;
  background:linear-gradient(135deg,var(--gold),#b8943a);
  color:var(--bg);font-weight:700;font-size:13px;
  transition:.3s;position:relative;overflow:hidden;
}
.open-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  opacity:0;transition:opacity .3s;
}
.open-btn:hover::before{opacity:1}
.open-btn span{position:relative;z-index:1}

/* ========== LENS MODAL ========== */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:.4s;padding:20px;
  backdrop-filter:blur(10px);
}
.modal-bg.open{opacity:1;visibility:visible}
.modal-box{
  background:rgba(12,10,10,.95);backdrop-filter:blur(30px);
  border-radius:var(--radius);width:100%;max-width:920px;max-height:90vh;overflow-y:auto;
  border:1px solid rgba(201,168,76,.1);
  transform:scale(.9) translateY(30px);transition:transform .5s cubic-bezier(.22,1,.36,1);
  box-shadow:0 30px 80px rgba(0,0,0,.5);
}
.modal-bg.open .modal-box{transform:scale(1) translateY(0)}

.modal-header{
  padding:24px 32px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid rgba(201,168,76,.08);
  position:sticky;top:0;background:rgba(12,10,10,.98);z-index:2;
  backdrop-filter:blur(20px);border-radius:var(--radius) var(--radius) 0 0;
}
.modal-header h2{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold)}
.modal-close{
  width:40px;height:40px;border-radius:50%;
  background:rgba(201,168,76,.08);color:var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  transition:.3s;
}
.modal-close:hover{background:var(--gold);color:var(--bg);transform:rotate(90deg)}

/* Lens Slider */
.slider-area{padding:40px 32px}
.lens-slider-container{
  position:relative;overflow:hidden;
  background:rgba(201,168,76,.02);border-radius:var(--radius);
  padding:40px 32px;border:1px solid rgba(201,168,76,.06);
}
.lens-slider-track{display:flex;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.lens-slide{
  min-width:100%;display:flex;gap:40px;align-items:center;padding:0 10px;
}
.lens-visual{
  width:240px;height:240px;border-radius:50%;position:relative;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  animation:lensGlow 3s ease-in-out infinite;
}
@keyframes lensGlow{
  0%,100%{box-shadow:0 0 40px rgba(201,168,76,.1)}
  50%{box-shadow:0 0 80px rgba(201,168,76,.2)}
}
.lens-visual-ring{
  position:absolute;inset:-8px;border-radius:50%;
  border:1px solid rgba(255,255,255,.05);
  animation:ringRotate 10s linear infinite;
}
.lens-visual-ring::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:6px;height:6px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 10px var(--gold);
}
@keyframes ringRotate{to{transform:rotate(360deg)}}
.lens-visual-inner{
  width:200px;height:200px;border-radius:50%;position:relative;overflow:hidden;
  box-shadow:inset 0 0 40px rgba(0,0,0,.3);
}
.lens-visual-inner::after{
  content:'';position:absolute;inset:20%;border-radius:50%;
  background:radial-gradient(circle,rgba(0,0,0,.2) 0%,transparent 70%);
}
.lens-circle{width:100%;height:100%;border-radius:50%}

.lens-details{flex:1}
.lens-details h3{font-family:'Playfair Display',serif;font-size:28px;color:var(--text);margin-bottom:10px}
.lens-desc{font-size:15px;color:var(--text-dim);line-height:1.8;margin-bottom:24px}

.lens-meta{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.meta-item{
  background:rgba(201,168,76,.04);padding:14px 22px;border-radius:var(--radius-sm);
  border:1px solid rgba(201,168,76,.08);
  transition:border-color .3s;
}
.meta-item:hover{border-color:rgba(201,168,76,.2)}
.meta-item .label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px}
.meta-item .value{font-size:22px;font-weight:700;color:var(--gold);margin-top:4px}
.meta-item .value.stock-low{color:#ff9800}
.meta-item .value.stock-out{color:var(--danger)}

.qty-selector{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.qty-selector label{font-size:14px;color:var(--text-dim)}
.qty-ctrl{
  display:flex;align-items:center;gap:0;
  background:rgba(201,168,76,.06);border-radius:var(--radius-sm);
  border:1px solid rgba(201,168,76,.1);overflow:hidden;
}
.qty-ctrl button{
  width:42px;height:42px;background:rgba(201,168,76,.06);color:var(--gold);
  font-size:20px;display:flex;align-items:center;justify-content:center;
  transition:.2s;
}
.qty-ctrl button:hover{background:var(--gold);color:var(--bg)}
.qty-ctrl .qty-display{width:50px;text-align:center;font-size:18px;font-weight:700;color:var(--text)}

.add-lens-btn{
  padding:16px 40px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);
  font-weight:700;font-size:15px;transition:.3s;
  display:inline-flex;align-items:center;gap:10px;
  position:relative;overflow:hidden;
}
.add-lens-btn::before{
  content:'';position:absolute;top:50%;left:50%;
  width:0;height:0;border-radius:50%;
  background:rgba(255,255,255,.2);
  transform:translate(-50%,-50%);
  transition:width .6s,height .6s;
}
.add-lens-btn:hover::before{width:300px;height:300px}
.add-lens-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(201,168,76,.3)}
.add-lens-btn:disabled{background:var(--text-dim);opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.add-lens-btn span{position:relative;z-index:1}

.slider-nav{display:flex;justify-content:center;align-items:center;gap:20px;margin-top:32px}
.slider-nav button{
  width:48px;height:48px;border-radius:50%;
  background:rgba(201,168,76,.06);color:var(--gold);
  font-size:20px;transition:.3s;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(201,168,76,.1);
}
.slider-nav button:hover{background:var(--gold);color:var(--bg);transform:scale(1.1)}
.slider-nav button:disabled{opacity:.15;cursor:not-allowed;transform:none}
.slider-dots{display:flex;align-items:center;gap:8px}
.slider-dot{
  width:10px;height:10px;border-radius:50%;
  background:rgba(201,168,76,.15);transition:.3s;cursor:pointer;
}
.slider-dot.active{background:var(--gold);transform:scale(1.4);box-shadow:0 0 12px rgba(201,168,76,.4)}

/* ========== CART ========== */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:3000;opacity:0;visibility:hidden;transition:.3s}
.cart-overlay.open{opacity:1;visibility:visible}
.cart-panel{
  position:fixed;top:0;left:0;width:440px;max-width:100vw;height:100vh;
  background:rgba(10,8,8,.95);backdrop-filter:blur(30px);
  z-index:3001;transform:translateX(-100%);transition:transform .5s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;
  border-right:1px solid rgba(201,168,76,.08);
}
.cart-panel.open{transform:translateX(0)}
.cart-top{
  padding:24px 28px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid rgba(201,168,76,.06);
}
.cart-top h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold)}
.cart-items-list{flex:1;overflow-y:auto;padding:16px 28px}
.cart-empty{text-align:center;padding:80px 20px;color:var(--text-dim)}
.cart-empty .ce-icon{font-size:60px;margin-bottom:16px;opacity:.3}
.ci{
  display:flex;gap:14px;padding:18px 0;
  border-bottom:1px solid rgba(201,168,76,.04);
  animation:cartIn .4s ease both;
}
@keyframes cartIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.ci-color{
  width:54px;height:54px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,.06);
  box-shadow:0 4px 15px rgba(0,0,0,.3);
}
.ci-info{flex:1}
.ci-name{font-size:15px;font-weight:600;margin-bottom:3px}
.ci-cat{font-size:11px;color:var(--text-dim);margin-bottom:10px}
.ci-bottom{display:flex;justify-content:space-between;align-items:center}
.ci-price{font-size:17px;font-weight:700;color:var(--gold)}
.ci-qty{display:flex;align-items:center;gap:6px}
.ci-qty button{
  width:28px;height:28px;border-radius:8px;
  background:rgba(201,168,76,.08);color:var(--gold);
  font-size:15px;display:flex;align-items:center;justify-content:center;
  transition:.2s;border:1px solid rgba(201,168,76,.1);
}
.ci-qty button:hover{background:var(--gold);color:var(--bg)}
.ci-qty span{font-size:15px;font-weight:600;min-width:22px;text-align:center}
.ci-remove{background:none;color:rgba(231,76,60,.6);font-size:16px;padding:4px;transition:.2s}
.ci-remove:hover{color:var(--danger);transform:scale(1.2)}

.cart-bottom{padding:28px;border-top:1px solid rgba(201,168,76,.06)}
.cb-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px;color:var(--text-dim)}
.cb-row.total{
  font-size:22px;font-weight:700;color:var(--gold);
  padding-top:14px;border-top:1px solid rgba(201,168,76,.1);margin-top:10px;
}
.checkout-btn{
  width:100%;padding:16px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--gold),#b8943a);color:var(--bg);font-weight:700;font-size:15px;
  margin-top:16px;transition:.3s;position:relative;overflow:hidden;
}
.checkout-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(201,168,76,.3)}
.checkout-btn:disabled{background:var(--text-dim);opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* ========== INVOICE ========== */
.inv-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:4000;
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:.3s;padding:20px;
  backdrop-filter:blur(10px);
}
.inv-overlay.open{opacity:1;visibility:visible}
.inv-box{
  background:#faf8f5;color:#222;border-radius:var(--radius);
  width:100%;max-width:580px;max-height:90vh;overflow-y:auto;
  padding:40px;
  transform:scale(.9);transition:transform .5s cubic-bezier(.22,1,.36,1);
}
.inv-overlay.open .inv-box{transform:scale(1)}
.inv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid var(--gold)}
.inv-brand{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold)}
.inv-brand small{display:block;font-size:11px;color:#999;font-family:'Inter',sans-serif;margin-top:4px}
.inv-info{text-align:left;font-size:12px;color:#888;line-height:2}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.inv-table th{background:var(--gold);color:var(--bg);padding:10px 12px;font-size:11px;text-align:right;font-weight:700}
.inv-table td{padding:10px 12px;border-bottom:1px solid #eee;font-size:13px;text-align:right}
.inv-color-dot{display:inline-block;width:14px;height:14px;border-radius:50%;vertical-align:middle;border:1px solid rgba(0,0,0,.1);margin-left:6px}
.inv-totals{text-align:left}
.inv-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px}
.inv-total{font-size:22px;font-weight:700;color:var(--gold);border-top:2px solid var(--gold);padding-top:12px;margin-top:8px}
.inv-actions{display:flex;gap:12px;margin-top:24px;justify-content:center}
.inv-btn{padding:12px 28px;border-radius:var(--radius-sm);font-weight:700;font-size:14px;transition:.3s}
.inv-print{background:var(--gold);color:var(--bg)}
.inv-print:hover{background:var(--gold-light)}
.inv-done{background:#eee;color:#333}
.inv-done:hover{background:#ddd}

/* ========== TOAST ========== */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);
  background:rgba(18,16,16,.95);backdrop-filter:blur(20px);
  border:1px solid rgba(201,168,76,.2);color:var(--text);
  padding:16px 32px;border-radius:var(--radius-sm);font-size:14px;
  z-index:9999;transition:transform .5s cubic-bezier(.22,1,.36,1);
  display:flex;align-items:center;gap:10px;white-space:nowrap;
  box-shadow:0 10px 40px rgba(0,0,0,.4);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ========== FOOTER ========== */
.footer{
  text-align:center;padding:40px 5%;
  border-top:1px solid rgba(201,168,76,.06);
  color:var(--text-dim);font-size:13px;position:relative;z-index:2;
}

/* ========== RESPONSIVE ========== */
@media(max-width:768px){
  .hero-glass{padding:40px 28px;border-radius:24px}
  .hero-logo-wrap svg{width:72px;height:72px}
  .color-grid{grid-template-columns:1fr}
  .lens-slide{flex-direction:column;text-align:center}
  .lens-visual{width:200px;height:200px}
  .lens-visual-inner{width:160px;height:160px}
  .lens-meta{justify-content:center}
  .qty-selector{justify-content:center}
  .add-lens-btn{margin:0 auto}
  .slider-area{padding:20px 16px}
  .lens-slider-container{padding:24px 16px}
  .cart-panel{width:100%}
  .inv-box{padding:24px}
  .modal-box{max-height:95vh}
}

@media print{
  body *{visibility:hidden}
  .inv-box,.inv-box *{visibility:visible}
  .inv-box{position:absolute;top:0;left:0;width:100%;padding:20px}
  .inv-actions{display:none!important}
}
</style>
</head>
<body>

<!-- FOOTER -->

<script>
// ========== DATA ==========
const COLORS_DATA = [
  {
    id:'brown', name:'بني', arName:'بني دافئ', swatch:'#8B5E3C',
    lenses:[
      {id:'b1',name:'عسل ذهبي',desc:'تدرج عسلي دافئ مع حلقة خارجية ناعمة',price:85,stock:30,color:'#D4A056',gradient:'radial-gradient(circle at 40% 35%,#D4A056,#8B5E3C,#5C3A1E)'},
      {id:'b2',name:'شوكولاتة',desc:'لون بني غامق عميق يعطي نظرة ساحرة',price:95,stock:22,color:'#5C3A1E',gradient:'radial-gradient(circle at 40% 35%,#7B5230,#4A2A10,#2E1808)'},
      {id:'b3',name:'كراميل',desc:'بني فاتح كريمي مثالي للبشرة السمراء',price:90,stock:18,color:'#C68642',gradient:'radial-gradient(circle at 40% 35%,#C68642,#8B5E3C,#5C3A1E)'},
      {id:'b4',name:'بندق',desc:'بني متوسط مع لمسات ذهبية خفيفة',price:88,stock:0,color:'#8B7355',gradient:'radial-gradient(circle at 40% 35%,#A0845C,#7B6B4F,#5A4D36)'},
    ]
  },
  {
    id:'blue', name:'أزرق', arName:'أزرق ساحر', swatch:'#4A90D9',
    lenses:[
      {id:'bl1',name:'محيط',desc:'أزرق محيطي عميق مع لمعة طبيعية',price:110,stock:25,color:'#2E6CB5',gradient:'radial-gradient(circle at 40% 35%,#5B9BD5,#2E6CB5,#1B3A5C)'},
      {id:'bl2',name:'سماء',desc:'أزرق سماوي فاتح يعطي نظرة براقة',price:100,stock:15,color:'#87CEEB',gradient:'radial-gradient(circle at 40% 35%,#87CEEB,#5BA3D9,#3A7BBF)'},
      {id:'bl3',name:'ثلجي',desc:'أزرق فاتح ثلجي مع تأثير مذهل',price:120,stock:8,color:'#B8D4E8',gradient:'radial-gradient(circle at 40% 35%,#D0E4F0,#A8C8DC,#7BAFC8)'},
      {id:'bl4',name:'زفير',desc:'أزرق بنفسجي غامض وساحر',price:115,stock:12,color:'#5B6CBF',gradient:'radial-gradient(circle at 40% 35%,#7B8CDF,#4A5AAF,#2E3A7B)'},
    ]
  },
  {
    id:'green', name:'أخضر', arName:'أخضر زمردي', swatch:'#5CAB68',
    lenses:[
      {id:'g1',name:'زيتون',desc:'أخضر زيتوني ناعم مع تدرج دافئ',price:105,stock:20,color:'#6B8E4E',gradient:'radial-gradient(circle at 40% 35%,#8BA85C,#6B8E4E,#4A6B32)'},
      {id:'g2',name:'زمردي',desc:'أخضر زمردي فاخر مع لمعة لامعة',price:130,stock:10,color:'#2E8B57',gradient:'radial-gradient(circle at 40% 35%,#3CB371,#2E8B57,#1B5E3B)'},
      {id:'g3',name:'فيروزي',desc:'أخضر فيروزي مائي منعش',price:115,stock:5,color:'#40B5A5',gradient:'radial-gradient(circle at 40% 35%,#5CD4C4,#40B5A5,#2A8A7B)'},
      {id:'g4',name:'غابة',desc:'أخضر غامق غامض يشبه الغابة',price:108,stock:14,color:'#2E6B3B',gradient:'radial-gradient(circle at 40% 35%,#3E8B4B,#2E6B3B,#1B4B28)'},
    ]
  },
  {
    id:'gray', name:'رمادي', arName:'رمادي أنيق', swatch:'#8A8A8A',
    lenses:[
      {id:'gr1',name:'فضي',desc:'رمادي فضي لامع مع تدرج أنيق',price:100,stock:28,color:'#B8B8B8',gradient:'radial-gradient(circle at 40% 35%,#D0D0D0,#A8A8A8,#787878)'},
      {id:'gr2',name:'فحمي',desc:'رمادي فحمي غامق يعطي نظرة قوية',price:95,stock:16,color:'#4A4A4A',gradient:'radial-gradient(circle at 40% 35%,#6A6A6A,#3A3A3A,#202020)'},
      {id:'gr3',name:'دخاني',desc:'رمادي دخاني مع لمسة بنفسجية خفيفة',price:105,stock:7,color:'#6B6B7B',gradient:'radial-gradient(circle at 40% 35%,#8B8B9B,#6B6B7B,#4A4A5A)'},
    ]
  },
  {
    id:'hazel', name:'عسلي', arName:'عسلي مميز', swatch:'#A0845C',
    lenses:[
      {id:'hz1',name:'لوز',desc:'عسلي لوزي فاتح مع تدرج طبيعي',price:95,stock:32,color:'#C4A265',gradient:'radial-gradient(circle at 40% 35%,#D4B878,#C4A265,#8B7355)'},
      {id:'hz2',name:'نحاسي',desc:'عسلي نحاسي دافئ مع بريق معدني',price:100,stock:20,color:'#B87333',gradient:'radial-gradient(circle at 40% 35%,#D4944A,#B87333,#7B4A1E)'},
      {id:'hz3',name:'ذهبي',desc:'عسلي ذهبي لامع مع تأثير شمس',price:110,stock:3,color:'#D4A056',gradient:'radial-gradient(circle at 40% 35%,#E8C070,#D4A056,#8B6A32)'},
    ]
  },
  {
    id:'purple', name:'بنفسجي', arName:'بنفسجي ملكي', swatch:'#7B5EA7',
    lenses:[
      {id:'p1',name:'لافندر',desc:'بنفسجي لافندر ناعم ورومانسي',price:110,stock:18,color:'#A88BC5',gradient:'radial-gradient(circle at 40% 35%,#C5A8DC,#A88BC5,#7B5EA7)'},
      {id:'p2',name:'أرجواني',desc:'بنفسجي غامق ملكي مع عمق مذهل',price:120,stock:11,color:'#6B3FA0',gradient:'radial-gradient(circle at 40% 35%,#8B5FC0,#6B3FA0,#4B2A70)'},
      {id:'p3',name:'ليلكي',desc:'بنفسجي فاتح ليلكي ساحر',price:115,stock:6,color:'#9B7FBF',gradient:'radial-gradient(circle at 40% 35%,#B89FD4,#9B7FBF,#7B5FA0)'},
    ]
  }
];

// ========== STATE ==========
let products = JSON.parse(localStorage.getItem('lensora_products')) || initProducts();
let cart = JSON.parse(localStorage.getItem('lensora_cart')) || [];
let orders = JSON.parse(localStorage.getItem('lensora_orders')) || [];
let currentColorIdx = 0;
let currentLensIdx = 0;

function initProducts(){
  let prods = [];
  COLORS_DATA.forEach(c => c.lenses.forEach(l => {
    prods.push({...l, categoryId: c.id, categoryName: c.arName});
  }));
  return prods;
}
function saveData(){
  localStorage.setItem('lensora_products', JSON.stringify(products));
  localStorage.setItem('lensora_cart', JSON.stringify(cart));
  localStorage.setItem('lensora_orders', JSON.stringify(orders));
}
function getProd(id){ return products.find(p => p.id === id); }

// ========== RENDER ==========
function renderCategories(){
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = COLORS_DATA.map((c, ci) => {
    const totalStock = c.lenses.reduce((s,l) => s + getProd(l.id).stock, 0);
    const dots = c.lenses.map(l => `<div class="color-dot" style="background:${l.gradient};"></div>`).join('');
    return `
      <div class="color-card" data-reveal data-reveal-delay="${ci * .1}">
        <div class="color-card-header">
          <div class="color-swatch" style="background:${c.swatch}"></div>
          <div>
            <h3>${c.arName}</h3>
            <span>${c.lenses.length} تدرج · ${totalStock} قطعة</span>
          </div>
        </div>
        <div class="color-card-body">
          <div class="color-preview">${dots}</div>
        </div>
        <div class="color-card-footer">
          <span>يبدأ من ${getProd(c.lenses[0].id).price} ر.س</span>
          <button class="open-btn"><span>تصفحي التدرجات ←</span></button>
        </div>
      </div>
    `;
  }).join('');
  grid.querySelectorAll('.open-btn').forEach((btn, i) => {
    btn.onclick = () => openLensModal(i);
  });
  initReveal();
}

// ========== SCROLL REVEAL ==========
function initReveal(){
  const els = document.querySelectorAll('[data-reveal]');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting){
        const delay = e.target.getAttribute('data-reveal-delay') || 0;
        setTimeout(() => e.target.classList.add('visible'), delay * 1000);
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  els.forEach(el => observer.observe(el));
}

// ========== NAV SCROLL ==========
window.addEventListener('scroll', () => {
  document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 60);
});

// ========== LENS MODAL ==========
function openLensModal(catIdx){
  currentColorIdx = catIdx;
  currentLensIdx = 0;
  document.getElementById('modalTitle').textContent = COLORS_DATA[catIdx].arName;
  renderSlider();
  document.getElementById('lensModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLensModal(){
  document.getElementById('lensModal').classList.remove('open');
  document.body.style.overflow = '';
}

function renderSlider(){
  const cat = COLORS_DATA[currentColorIdx];
  const track = document.getElementById('lensTrack');
  const dots = document.getElementById('sliderDots');

  track.innerHTML = cat.lenses.map((l, li) => {
    const p = getProd(l.id);
    const sc = p.stock === 0 ? 'stock-out' : p.stock <= 5 ? 'stock-low' : '';
    const st = p.stock === 0 ? 'نفذ من المخزن' : p.stock <= 5 ? `باقي ${p.stock} فقط!` : `${p.stock} قطعة`;
    return `
      <div class="lens-slide">
        <div class="lens-visual">
          <div class="lens-visual-ring"></div>
          <div class="lens-visual-inner">
            <div class="lens-circle" style="background:${l.gradient};box-shadow:0 0 50px ${l.color}30"></div>
          </div>
        </div>
        <div class="lens-details">
          <h3>${l.name}</h3>
          <p class="lens-desc">${l.desc}</p>
          <div class="lens-meta">
            <div class="meta-item">
              <div class="label">السعر</div>
              <div class="value">${l.price} ر.س</div>
            </div>
            <div class="meta-item">
              <div class="label">المتاح</div>
              <div class="value ${sc}">${st}</div>
            </div>
          </div>
          <div class="qty-selector">
            <label>الكمية:</label>
            <div class="qty-ctrl">
              <button onclick="changeModalQty(-1,${li})">−</button>
              <div class="qty-display" id="mq_${li}">1</div>
              <button onclick="changeModalQty(1,${li})">+</button>
            </div>
          </div>
          <button class="add-lens-btn" onclick="addFromSlider('${l.id}',${li})" ${p.stock === 0 ? 'disabled' : ''}>
            <span>${p.stock === 0 ? ' غير متوفر' : '🛒  أضف للسلة'}</span>
          </button>
        </div>
      </div>
    `;
  }).join('');

  dots.innerHTML = cat.lenses.map((_, li) =>
    `<div class="slider-dot ${li === currentLensIdx ? 'active' : ''}" onclick="goToSlide(${li})"></div>`
  ).join('');

  updateSliderPosition();
}

function updateSliderPosition(){
  const track = document.getElementById('lensTrack');
  track.style.transform = `translateX(${currentLensIdx * 100}%)`;
  document.querySelectorAll('.slider-dot').forEach((d, i) => d.classList.toggle('active', i === currentLensIdx));
  const cat = COLORS_DATA[currentColorIdx];
  document.getElementById('prevBtn').disabled = currentLensIdx === 0;
  document.getElementById('nextBtn').disabled = currentLensIdx >= cat.lenses.length - 1;
}

function slideMove(dir){
  const cat = COLORS_DATA[currentColorIdx];
  currentLensIdx = Math.max(0, Math.min(cat.lenses.length - 1, currentLensIdx + dir));
  updateSliderPosition();
}
function goToSlide(i){ currentLensIdx = i; updateSliderPosition(); }

function changeModalQty(delta, li){
  const el = document.getElementById(`mq_${li}`);
  let v = parseInt(el.textContent) + delta;
  const p = getProd(COLORS_DATA[currentColorIdx].lenses[li].id);
  v = Math.max(1, Math.min(v, Math.max(1, p.stock)));
  el.textContent = v;
}

function addFromSlider(lensId, li){
  const p = getProd(lensId);
  if (!p || p.stock <= 0) return;
  const qty = parseInt(document.getElementById(`mq_${li}`).textContent);
  const inCart = cart.find(c => c.productId === lensId);
  const current = inCart ? inCart.qty : 0;
  if (current + qty > p.stock){ showToast('⚠️ الكمية المطلوبة تتجاوز المتاح'); return; }
  if (inCart) inCart.qty += qty;
  else cart.push({productId: lensId, qty});
  saveData(); updateCartBadge();
  showToast(`✅ تمت إضافة "${p.name}" (${qty} قطعة)`);
  document.getElementById(`mq_${li}`).textContent = '1';
  renderSlider();
}

// ========== CART ==========
function updateCartBadge(){
  const t = cart.reduce((s,c) => s + c.qty, 0);
  const b = document.getElementById('cartBadge');
  b.textContent = t > 0 ? t : '';
  b.style.display = t > 0 ? 'flex' : 'none';
}

function openCart(){
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartPanel').classList.add('open');
  renderCart();
}
function closeCart(){
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartPanel').classList.remove('open');
}

function renderCart(){
  const list = document.getElementById('cartItemsList');
  const bottom = document.getElementById('cartBottom');
  if (cart.length === 0){
    list.innerHTML = `<div class="cart-empty"><div class="ce-icon">👁️</div><p>السلة فارغة</p><p style="font-size:13px;margin-top:8px">تصفحي الألوان وأضيفي عدساتك المفضلة!</p></div>`;
    bottom.innerHTML = '';
    return;
  }
  list.innerHTML = cart.map(c => {
    const p = getProd(c.productId);
    if (!p) return '';
    return `
      <div class="ci">
        <div class="ci-color" style="background:${p.gradient}"></div>
        <div class="ci-info">
          <div class="ci-name">${p.name}</div>
          <div class="ci-cat">${p.categoryName}</div>
          <div class="ci-bottom">
            <span class="ci-price">${p.price * c.qty} ر.س</span>
            <div class="ci-qty">
              <button onclick="changeCartQty('${c.productId}',-1)">−</button>
              <span>${c.qty}</span>
              <button onclick="changeCartQty('${c.productId}',1)">+</button>
            </div>
          </div>
        </div>
        <button class="ci-remove" onclick="removeFromCart('${c.productId}')">🗑</button>
      </div>
    `;
  }).join('');

  const sub = cart.reduce((s,c) => { const p = getProd(c.productId); return s + (p ? p.price * c.qty : 0); }, 0);
  const ship = sub >= 200 ? 0 : 15;
  const total = sub + ship;
  bottom.innerHTML = `
    <div class="cb-row"><span>المجموع</span><span>${sub} ر.س</span></div>
    <div class="cb-row"><span>الشحن ${ship === 0 ? '(مجاني)' : ''}</span><span>${ship === 0 ? 'مجاني' : ship + ' ر.س'}</span></div>
    <div class="cb-row total"><span>الإجمالي</span><span>${total} ر.س</span></div>
    <button class="checkout-btn" onclick="checkout()">🧾 إتمام الشراء وإصدار الفاتورة</button>
  `;
}

function changeCartQty(pid, delta){
  const item = cart.find(c => c.productId === pid);
  const p = getProd(pid);
  if (!item || !p) return;
  item.qty += delta;
  if (item.qty <= 0){ removeFromCart(pid); return; }
  if (item.qty > p.stock){ item.qty = p.stock; showToast('⚠️ وصلت الحد الأقصى'); }
  saveData(); updateCartBadge(); renderCart();
}

function removeFromCart(pid){
  cart = cart.filter(c => c.productId !== pid);
  saveData(); updateCartBadge(); renderCart();
}

// ========== CHECKOUT ==========
function checkout(){
  if (cart.length === 0) return;
  cart.forEach(c => { const p = getProd(c.productId); if (p) p.stock = Math.max(0, p.stock - c.qty); });
  let sub = 0;
  const items = cart.map(c => {
    const p = getProd(c.productId);
    const line = p.price * c.qty;
    sub += line;
    return { name: p.name, category: p.categoryName, price: p.price, qty: c.qty, lineTotal: line, color: p.color, gradient: p.gradient };
  });
  const ship = sub >= 200 ? 0 : 15;
  const total = sub + ship;
  const order = {
    id: 'LSR-' + Date.now().toString(36).toUpperCase(),
    date: new Date().toLocaleDateString('ar-SA', {year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    items, sub, ship, total, status: 'completed'
  };
  orders.push(order);
  saveData();
  showInvoice(order);
  cart = []; saveData(); updateCartBadge(); closeCart(); renderCategories();
  showToast('✅ تم الشراء بنجاح! تم إصدار الفاتورة');
}

// ========== INVOICE ==========
function showInvoice(order){
  const overlay = document.getElementById('invOverlay');
  const box = document.getElementById('invBox');
  box.innerHTML = `
    <div class="inv-top">
      <div class="inv-brand">LENSORA<small>عدسات ملونة فاخرة</small></div>
      <div class="inv-info">
        <div>فاتورة #: <strong>${order.id}</strong></div>
        <div>التاريخ: ${order.date}</div>
        <div>الحالة: ✅ مكتمل</div>
      </div>
    </div>
    <table class="inv-table">
      <thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>الإجمالي</th></tr></thead>
      <tbody>
        ${order.items.map(it => `
          <tr>
            <td><span class="inv-color-dot" style="background:${it.gradient}"></span>${it.name}<br><small style="color:#999">${it.category}</small></td>
            <td>${it.price} ر.س</td><td>${it.qty}</td><td><strong>${it.lineTotal} ر.س</strong></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    <div class="inv-totals">
      <div class="inv-row"><span>المجموع</span><span>${order.sub} ر.س</span></div>
      <div class="inv-row"><span>الشحن</span><span>${order.ship === 0 ? 'مجاني' : order.ship + ' ر.س'}</span></div>
      <div class="inv-total"><span>الإجمالي</span><span>${order.total} ر.س</span></div>
    </div>
    <div class="inv-actions">
      <button class="inv-btn inv-print" onclick="window.print()">🖨️ طباعة</button>
      <button class="inv-btn inv-done" onclick="closeInvoice()">إغلاق</button>
    </div>
  `;
  overlay.classList.add('open');
}
function closeInvoice(){ document.getElementById('invOverlay').classList.remove('open'); }

// ========== TOAST ==========
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ========== KEYBOARD ==========
document.addEventListener('keydown', e => {
  if (e.key === 'Escape'){ closeLensModal(); closeCart(); closeInvoice(); }
});

// ========== PARTICLES ==========
const canvas = document.getElementById('particlesCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor(){
    this.reset();
  }
  reset(){
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 1.5 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.2;
    this.opacity = Math.random() * 0.4 + 0.1;
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = Math.random() * 0.02 + 0.005;
  }
  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    this.pulse += this.pulseSpeed;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
  }
  draw(){
    const alpha = this.opacity * (0.5 + 0.5 * Math.sin(this.pulse));
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201,168,76,${alpha})`;
    ctx.fill();
  }
}

for (let i = 0; i < 60; i++) particles.push(new Particle());

function animateParticles(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ========== INIT ==========
renderCategories();
updateCartBadge();
</script>
</body>
</html>
